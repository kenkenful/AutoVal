- name: Fio_Fb_Stress
  runner: autoval
  args:
    test_params:
      drive_type: ssd
      drive_interface: nvme
      drives:
        - nvme0n1
      include_boot_drive: false
      only_boot_drive: false
      remove_partition: false
      unmount_before_test: false
      fio_timeout: 180000
      run_definition:
        randrw:
          args:
            BLKSIZE: 8k
            IODEPTH: '1'
            RUNTIME: 10s
            SIZE: 100%
          precondition_loops: 0
          template: stress_fio.fio
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: true
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 25800
  cmd: autoval_ssd.tests.fio_fb.fio_fb
