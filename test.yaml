- name: nvme_cli_data_nvme_only
  runner: autoval
  args:
    test_params:
      drive_type: ssd
      drive_interface: nvme
      drives:
        - nvme0n1
      include_boot_drive: false
      only_boot_drive: false
      remove_partition: false
      unmount_before_test: false
      skip_commands:
        - _validate_power_mode
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 1800
  cmd: autoval_ssd.tests.nvme_cli.nvme_cli
