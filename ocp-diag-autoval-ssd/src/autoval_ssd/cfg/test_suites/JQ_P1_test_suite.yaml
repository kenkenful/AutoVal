- name: Flash Firmware Update
  runner: autoval
  args:
    test_params:
      cycle: 3
      verify_io: false
      versions:
      - stable
      - latest
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 1800
  cmd: autoval_ssd.tests.flash_firmware_update.flash_firmware_update
- name: Flash Firmware Update with IO 20 Cycles
  runner: autoval
  args:
    test_params:
      cycle: 20
      run_definition:
        verify:
          args:
            BLKSIZERANGE: 4k-128k
            DEPTH: '128'
            RUNTIME: 5m
            RW: randrw
            SIZE: 10G
            VERIFY: crc32c
          template: range_verify.job
      verify_io: true
      versions:
      - stable
      - latest
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 1800
  cmd: autoval_ssd.tests.flash_firmware_update.flash_firmware_update
- name: NVME_Format_10_Cycles
  runner: autoval
  args:
    test_params:
      cycle_count: 1
      drive_interface: nvme
      drive_type: ssd
      format_cycles: 10
      fstype: ext4
      ignore_smart: true
      run_definition:
        filesystem_io:
          args:
            BLKSIZE: 4K
            BUFFER_PATTERN: "0xA5"
            DEPTH: 128
            DO_VERIFY: 1
            NAME: fio_nvme
            RUNTIME: 3m
            RW: write
          template: nvme_format_template.fio
      secure_erase_option:
        - 0
        - 1
        - 2
      skip_iops_validation: true
  execution_type: REMOTE_EXEC_TEST
  hostage: NONE
  continue_on_error: true
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 21600
  cmd: autoval_ssd.tests.nvme_format.nvme_format
