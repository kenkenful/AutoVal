- name: USSDT_Workload_loop
  runner: autoval
  args:
    test_params:
      test_drive_filter: true
      drive_type: ssd
      workload:
        - USSDT_Workload_loop
      fio_synth_params:
        synth_verify: true
        ignore_error: true
        parallel: true
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: true
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 86400
  cmd: autoval_ssd.tests.fio_synth_flash.fio_synth_flash
