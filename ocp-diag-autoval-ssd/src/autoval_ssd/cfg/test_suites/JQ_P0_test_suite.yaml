- name: Flash_data_integrity_10_local_warm
  runner: autoval
  args:
    test_params:
      cycle_count: 10
      cycle_type: warm
      drive_type: ssd
      remote_fio: false
  execution_type: REMOTE_EXEC_TEST
  hostage: NONE
  continue_on_error: true
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 21600
  cmd: autoval_ssd.tests.drive_data_integrity.drive_data_integrity
