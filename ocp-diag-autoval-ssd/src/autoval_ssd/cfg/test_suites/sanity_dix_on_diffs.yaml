- name: ssd_iogo_DIX
  runner: autoval
  args:
    test_params:
      fstype: xfs
      drive_type: ssd
      drive_interface: nvme
      max_latency: 15
      precondition_loops: 0
      collect_smart_log: true
      collect_drive_data: true
      timeout: 518400
      perform_resize: true
      sweep_param_key: usercapacity
      sweep_param_unit: num_TB
      sweep_param_value: 1
      cycle_count: 1
      set_power_state: true
      devices:
      - ALL
      trimrate: true
      workload: prep
      secure_erase_option: 0
      iogo_runtime: 30
      dix_ns_resize: true
  execution_type: LOCAL_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: true
  min_hosts: 1
  max_hosts: 1
  timeout: 518400
  cmd: autoval_ssd.tests.storage_hw_eng.tests.ssd_tests.ssd_iogo.ssd_iogo
