  cmd: autoval_ssd.tests.drive_data_integrity.drive_data_integrity
- name: drive_cache_check_bootdrive
  runner: autoval
  args:
    test_params:
      power_trigger: false
      power_cycle: warm
      power_random_time: false
      only_boot_drive: true
      write_fio:
        write:
          template: basic_write.fio
          args:
            BLKSIZE: 4k
            DEPTH: 128
            RUNTIME: 10m
            SIZE: 100%
            RW: randwrite
            VERIFY: md5
      read_fio:
        read:
          template: basic_read.fio
          args:
            BLKSIZE: 4k
            DEPTH: 128
            RUNTIME: 10m
            SIZE: 100%
            RW: randread
            VERIFY: md5
  execution_type: REMOTE_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 21600
  cmd: autoval_ssd.tests.drive_cache_check.drive_cache_check
