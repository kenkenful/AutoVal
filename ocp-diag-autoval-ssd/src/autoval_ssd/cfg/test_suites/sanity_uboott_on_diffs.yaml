- name: fio_rootfs_test
  runner: autoval
  args:
    test_params:
      check_not_empty_test_drives: false
      only_boot_drive: true
      run_definition:
        random:
          template: rootfs_template.job
          files:
            file: /root/havoc_fio_file
          args:
            NAME: fio_rootfs_test
            RW: randrw
            BLKSIZE: 128k
            SIZE: 60G
            RUNTIME: 30m
            DEPTH: 128
            MIXWRITE: 50
            MIXREAD: 50
  execution_type: REMOTE_EXEC_TEST
  hostage: NONE
  continue_on_error: false
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 21600
  cmd: autoval_ssd.tests.fio_fb.fio_fb
