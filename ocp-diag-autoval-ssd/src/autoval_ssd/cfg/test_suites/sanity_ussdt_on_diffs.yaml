      nvme_flush: true
      skip_iops_validation: true
      power_trigger: false
      iteration_count: 1
      workloads:
        nvme_flush_write:
          nvme_flush:
            template: basic_write.fio
            filesystem_type: ext4
            filesystem_options: ""
            filesystem: true
            args:
              BLKSIZE: 4k
              SIZE: 100%
              DEPTH: 128
              RUNTIME: 10m
              VERIFY: md5
              RW: randwrite
        nvme_flush_read:
          nvme_flush:
            template: basic_read.fio
            filesystem_type: ext4
            filesystem_options: ""
            filesystem: true
            skip_fs: true
            args:
              BLKSIZE: 4k
              SIZE: 100%
              DEPTH: 128
              RUNTIME: 10m
              VERIFY: md5
              RW: randread
        nvme_flush_verify:
          nvme_flush:
            template: basic_verify.fio
            filesystem_type: ext4
            filesystem_options: ""
            filesystem: true
            skip_fs: true
            args:
              RW: randread
              BLKSIZE: 4k
              SIZE: 100%
              DEPTH: "128"
              VERIFY: md5
  execution_type: REMOTE_EXEC_TEST
