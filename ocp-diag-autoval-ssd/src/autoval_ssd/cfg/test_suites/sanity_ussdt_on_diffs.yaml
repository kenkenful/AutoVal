- name: NVME_NS_Resize_OP
  runner: autoval
  args:
    test_params:
      cycle_count: 1
      drive_interface: nvme
      drive_type: ssd
      revert_sweep_param_key: usercapacity
      revert_sweep_param_unit: num_TB
      run_definition:
        filesystem_io:
          args:
            BLKSIZE: 4K
            DEPTH: 128
            MIXREAD: 50
            MIXWRITE: 50
            NAME: fio_nvme
            RUNTIME: 60
            RW: write
            SIZE: 10G
          template: filesystem_template.job
      skip_iops_validation: true
      sweep_param_key: overprovisioning
      sweep_param_unit: percent
      sweep_param_values:
        - 7
        - 20
        - 28
        - 50
  execution_type: REMOTE_EXEC_TEST
  hostage: NONE
  continue_on_error: true
  skip_health_check: false
  min_hosts: 1
  max_hosts: 1
  timeout: 10800
  cmd: autoval_ssd.tests.nvme_ns_resize.nvme_ns_resize
